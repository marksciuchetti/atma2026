<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1E4468">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>AtMA 2026 · Nashville</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@500;600;700;800&family=Source+Serif+4:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<style>
  :root{
    /* Palette drawn from the Atlantic Marketing Association logo (navy nautical blues)
       plus companion sea teal and sand gold accents for room coding. */
    --bg:#F5F8FA;
    --card:#FFFFFF;
    --tint:#EDF3F8;
    --ink:#152B40;
    --ink-soft:#5A6B7C;
    --line:#DBE4EC;
    --navy:#1E4468;
    --blue:#2E77AC;
    --teal:#2E7D74;
    --gold:#8F6A26;
    --gold-bright:#D8A93C;
    --grey:#7C8B9A;
    /* The AtMA site theme font is set inside Weebly files that automated tools
       cannot open, so the family below is the one line to change if the board
       standardizes on a specific typeface. */
    --brand:"Libre Franklin","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --serif:"Source Serif 4",Georgia,"Times New Roman",serif;
    --utility:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--utility);
    font-size:16px;line-height:1.5;
    padding-bottom:calc(78px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:660px;margin:0 auto;padding:0 16px;position:relative;z-index:1}

  /* ---------- Masthead ---------- */
  header.bill{
    background:linear-gradient(180deg,var(--navy) 0%,#2A5580 100%);
    color:#fff;text-align:center;padding:22px 16px 18px;
  }
  .bill .logo{
    height:64px;max-width:82%;object-fit:contain;display:inline-block;
    background:#fff;border-radius:10px;padding:7px 14px;margin-bottom:10px;
  }
  .bill .assoc{font-family:var(--brand);font-weight:600;letter-spacing:.16em;text-transform:uppercase;font-size:11.5px;color:#BCD2E4}
  .bill h1{
    font-family:var(--brand);font-weight:800;
    font-size:clamp(26px,7vw,34px);line-height:1.12;letter-spacing:.01em;margin:4px 0 6px;color:#fff;
  }
  .bill .dates{font-family:var(--brand);font-weight:500;font-size:13.5px;color:#CBDCEA}
  .bill .rule{width:56px;border-top:2px solid var(--gold-bright);margin:12px auto 0}

  /* ---------- Sticky controls ---------- */
  .controls{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--line);padding:10px 0 10px;box-shadow:0 8px 16px -14px rgba(21,43,64,.45)}
  .daytabs{display:flex;gap:8px}
  .daytab{
    flex:1;border:1px solid var(--line);background:var(--card);color:var(--ink);
    font-family:var(--brand);cursor:pointer;
    padding:7px 2px 6px;text-align:center;border-radius:10px;
  }
  .daytab .d{font-weight:700;font-size:14.5px;letter-spacing:.02em;display:block;line-height:1.1}
  .daytab .n{font-weight:500;font-size:11px;letter-spacing:.04em;color:var(--ink-soft);display:block;margin-top:2px}
  .daytab.on{background:var(--navy);border-color:var(--navy);color:#fff}
  .daytab.on .n{color:#BCD2E4}
  .searchrow{display:flex;gap:8px;margin-top:9px}
  .searchrow input{
    flex:1;border:1px solid var(--line);background:var(--card);border-radius:10px;
    padding:9px 12px;font:15px var(--utility);color:var(--ink);
  }
  .searchrow input::placeholder{color:#93A3B2}
  .searchrow input:focus{outline:2px solid var(--blue);outline-offset:1px}
  .roomchips{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
  .chip{
    border:1px solid var(--line);background:var(--card);border-radius:999px;cursor:pointer;
    font-family:var(--brand);font-weight:600;letter-spacing:.03em;
    font-size:12px;padding:5px 12px;color:var(--ink-soft);
  }
  .chip::before{content:"";display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;background:var(--grey);vertical-align:1px}
  .chip.all::before{display:none}
  .chip.rA::before{background:var(--blue)}
  .chip.rB::before{background:var(--teal)}
  .chip.rC::before{background:var(--gold)}
  .chip.on{background:var(--navy);border-color:var(--navy);color:#fff}

  /* ---------- Session cards ---------- */
  .dayhead{font-family:var(--brand);font-weight:700;letter-spacing:.02em;font-size:14px;color:var(--ink-soft);margin:18px 2px 8px}
  .timehead{display:flex;align-items:center;gap:10px;margin:20px 2px 9px}
  .timehead .t{font-family:var(--brand);font-weight:700;letter-spacing:.04em;font-size:13.5px;color:var(--navy);white-space:nowrap;text-transform:uppercase}
  .timehead .l{flex:1;border-top:1px solid var(--line)}
  .card{
    background:var(--card);border:1px solid var(--line);border-left:4px solid var(--grey);
    border-radius:12px;margin:0 0 10px;padding:13px 14px;position:relative;
    box-shadow:0 1px 2px rgba(21,43,64,.06);
  }
  .card.rA{border-left-color:var(--blue)}
  .card.rB{border-left-color:var(--teal)}
  .card.rC{border-left-color:var(--gold)}
  .card .toprow{display:flex;align-items:flex-start;gap:8px}
  .card .code{font-family:var(--brand);font-weight:700;font-size:12px;letter-spacing:.05em;color:var(--ink-soft);text-transform:uppercase}
  .card h3{font-family:var(--serif);font-weight:700;font-size:17.5px;line-height:1.3;margin:3px 0 5px;flex:1}
  .card .meta{font-family:var(--brand);font-weight:600;letter-spacing:.03em;font-size:12px;color:var(--ink-soft)}
  .card .meta .room{font-weight:700}
  .card.rA .room{color:var(--blue)} .card.rB .room{color:var(--teal)} .card.rC .room{color:var(--gold)}
  .nowtag{display:inline-block;background:var(--gold-bright);color:var(--navy);font-family:var(--brand);font-weight:800;font-size:10px;letter-spacing:.1em;padding:2px 8px;border-radius:999px;margin-left:6px;vertical-align:1px}
  .star{
    border:none;background:none;cursor:pointer;font-size:24px;line-height:1;color:#B9C6D2;
    padding:2px 2px 2px 8px;flex:none;
  }
  .star[aria-pressed="true"]{color:var(--gold-bright)}
  .star:focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:6px}
  .expander{
    margin-top:8px;border:none;background:none;cursor:pointer;color:var(--blue);
    font-family:var(--brand);font-weight:700;letter-spacing:.04em;font-size:12.5px;padding:2px 0;
  }
  .expander:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
  .papers{margin-top:9px;border-top:1px solid var(--line);padding-top:4px}
  .paper{padding:9px 0;border-bottom:1px solid var(--tint)}
  .paper:last-child{border-bottom:none}
  .paper .pt{font-family:var(--serif);font-weight:700;font-size:15.5px;line-height:1.35}
  .paper .pa{font-size:13px;color:var(--ink-soft);margin-top:3px;line-height:1.45}
  .paper .ps{font-family:var(--brand);font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-size:10px;color:#6B7C8C;margin-top:4px}
  .evt{background:var(--tint);border-style:solid;border-color:var(--line);border-left:4px solid var(--grey)}
  .empty{
    border:1.5px dashed var(--line);border-radius:12px;padding:28px 16px;text-align:center;color:var(--ink-soft);
    font-family:var(--utility);font-size:15px;margin-top:16px;background:var(--card)
  }
  .btn{
    display:inline-block;border:1px solid var(--navy);background:var(--navy);color:#fff;
    font-family:var(--brand);font-weight:700;letter-spacing:.04em;
    font-size:13px;padding:10px 16px;border-radius:10px;cursor:pointer;text-decoration:none;text-align:center;
  }
  .btn.ghost{background:var(--card);color:var(--navy)}
  .btn:focus-visible{outline:2px solid var(--gold-bright);outline-offset:2px}
  .btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

  /* ---------- Section headings ---------- */
  .sec{margin-top:26px}
  .sec > h2{
    font-family:var(--brand);font-weight:800;letter-spacing:.02em;color:var(--navy);
    font-size:17px;border-bottom:2px solid var(--gold-bright);padding-bottom:5px;margin-bottom:10px
  }
  .note{font-size:13.5px;color:var(--ink-soft)}
  .prose{font-family:var(--serif);font-size:16px;line-height:1.6}
  .prose p{margin:0 0 12px}
  .kv{margin:8px 0 0}
  .kv .k{font-family:var(--brand);font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-size:11px;color:var(--blue)}
  .kv .v{font-size:14.5px;margin:2px 0 11px}
  a{color:var(--blue)}

  /* ---------- Map ---------- */
  .mapbox{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 6px 2px;margin-top:10px;box-shadow:0 1px 2px rgba(21,43,64,.06)}
  .mapbox svg{width:100%;height:auto;display:block}
  .poi-dot{cursor:pointer}
  .poi-dot circle.halo{fill:transparent}
  .poi-dot.sel circle.core{stroke:var(--gold-bright);stroke-width:3}
  .legend{list-style:none;margin-top:10px}
  .legend li{display:flex;gap:10px;align-items:baseline;padding:8px 4px;border-bottom:1px solid var(--tint);cursor:pointer}
  .legend li:last-child{border-bottom:none}
  .legend .num{
    flex:none;width:20px;height:20px;border-radius:50%;color:#fff;text-align:center;
    font-family:var(--brand);font-weight:700;font-size:11.5px;line-height:20px;transform:translateY(3px)
  }
  .legend .nm{font-family:var(--serif);font-weight:700;font-size:15.5px}
  .legend .ds{font-family:var(--brand);font-weight:600;font-size:11px;letter-spacing:.04em;color:var(--ink-soft);margin-left:auto;white-space:nowrap}
  .poicard{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:12px;padding:13px;margin-top:10px;box-shadow:0 1px 2px rgba(21,43,64,.06)}
  .poicard h3{font-family:var(--serif);font-size:17px}
  .poicard .cat{font-family:var(--brand);font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-size:10.5px;color:var(--ink-soft)}
  .poicard p{font-size:14px;margin-top:5px}
  .roomguide .rg{padding:9px 2px;border-bottom:1px solid var(--tint)}
  .roomguide .rg:last-child{border-bottom:none}
  .roomguide .rn{font-family:var(--serif);font-weight:700;font-size:15.5px}
  .roomguide .ru{font-size:13px;color:var(--ink-soft);margin-top:2px}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px}

  /* ---------- Live map markers ---------- */
  #liveMap{height:380px;background:var(--tint)}
  .lm-pin{
    width:26px;height:26px;border-radius:50%;color:#fff;text-align:center;
    font-family:var(--brand);font-weight:700;font-size:12.5px;line-height:23px;
    border:2px solid #fff;box-shadow:0 1px 4px rgba(21,43,64,.45);
  }
  .lm-star{
    width:30px;height:30px;border-radius:50%;background:var(--gold-bright);color:var(--navy);
    font-size:16px;line-height:27px;text-align:center;
    border:2px solid #fff;box-shadow:0 1px 4px rgba(21,43,64,.5);
  }
  .leaflet-popup-content{font-family:var(--utility);font-size:13.5px;line-height:1.45;margin:10px 13px}
  .leaflet-popup-content-wrapper{border-radius:10px}
  .leaflet-container a.gm{color:var(--blue);font-weight:600}

  /* ---------- Board ---------- */
  .board .msg{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px}
  .board .who{font-family:var(--brand);font-weight:700;font-size:12.5px;color:var(--navy)}
  .board .when{font-size:11px;color:#6B7C8C;margin-left:6px;font-family:var(--utility)}
  .board .txt{font-size:14.5px;margin-top:3px;white-space:pre-wrap;word-wrap:break-word}
  .board input,.board textarea{
    width:100%;border:1px solid var(--line);background:var(--card);border-radius:10px;
    padding:9px 12px;font:14.5px var(--utility);color:var(--ink);margin-bottom:8px
  }
  .board textarea{min-height:70px;resize:vertical}
  .board input:focus,.board textarea:focus{outline:2px solid var(--blue);outline-offset:1px}

  /* ---------- Bottom nav ---------- */
  nav.tabs{
    position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--navy);
    padding-bottom:env(safe-area-inset-bottom);border-top:3px solid var(--gold-bright);
  }
  nav.tabs .in{max-width:660px;margin:0 auto;display:flex}
  nav.tabs button{
    flex:1;background:none;border:none;color:#8FA9C0;cursor:pointer;padding:9px 0 8px;
    font-family:var(--brand);font-weight:600;letter-spacing:.05em;font-size:10.5px;
    display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;
  }
  nav.tabs button svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  nav.tabs button.on{color:#fff}
  nav.tabs button.on::after{content:"";position:absolute;top:-3px;left:22%;right:22%;height:3px;background:var(--gold-bright)}
  nav.tabs button:focus-visible{outline:2px solid #fff;outline-offset:-3px}
  .badge{
    position:absolute;top:4px;right:calc(50% - 21px);background:var(--gold-bright);color:var(--navy);
    border-radius:999px;font-size:9.5px;min-width:15px;height:15px;line-height:15px;padding:0 3px;font-family:var(--utility);font-weight:700
  }
  footer{margin:34px 0 8px;text-align:center;font-family:var(--brand);font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:10.5px;color:#6B7C8C}
  .hide{display:none !important}
  @media (prefers-reduced-motion:no-preference){
    .card,.poicard{transition:box-shadow .15s ease}
  }
</style>
</head>
<body>
<header class="bill" role="banner">
  <img class="logo" src="https://www.atlanticmarketingassociation.com/uploads/1/3/3/7/133733174/atma-logo.png" alt="Atlantic Marketing Association logo" onerror="this.classList.add('hide')">
  <div class="assoc">Atlantic Marketing Association</div>
  <h1>51st Annual Conference &middot; Nashville</h1>
  <div class="dates">October 1 to 3, 2026 &middot; Drury Plaza Hotel Downtown</div>
  <div class="rule"></div>
</header>

<div id="programControls" class="controls">
  <div class="wrap">
    <div class="daytabs" id="dayTabs" role="tablist" aria-label="Conference days"></div>
    <div class="searchrow">
      <input id="q" type="search" placeholder="Search sessions, papers, authors" aria-label="Search sessions, papers, and authors">
    </div>
    <div class="roomchips" id="roomChips" role="group" aria-label="Filter by room"></div>
  </div>
</div>

<main class="wrap" id="view" tabindex="-1"></main>

<footer class="wrap">51st AtMA &middot; Music City &middot; 2026</footer>

<nav class="tabs" aria-label="Main">
  <div class="in">
    <button id="tab-program" class="on" aria-label="Program">
      <svg viewBox="0 0 24 24"><path d="M4 5h16M4 10h16M4 15h10M4 20h7"/></svg>
      Program
    </button>
    <button id="tab-agenda" aria-label="My agenda">
      <svg viewBox="0 0 24 24"><path d="M12 3l2.6 5.6 6.1.7-4.5 4.2 1.2 6-5.4-3-5.4 3 1.2-6L3.3 9.3l6.1-.7z"/></svg>
      My Agenda
      <span id="agendaBadge" class="badge hide">0</span>
    </button>
    <button id="tab-map" aria-label="Map">
      <svg viewBox="0 0 24 24"><path d="M12 21s-6.5-5.4-6.5-10A6.5 6.5 0 0 1 12 4.5 6.5 6.5 0 0 1 18.5 11c0 4.6-6.5 10-6.5 10z"/><circle cx="12" cy="11" r="2.4"/></svg>
      Map
    </button>
    <button id="tab-info" aria-label="Info and connect">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M12 11v5M12 7.5v.5"/></svg>
      Info
    </button>
  </div>
</nav>

/* ---------------- storage adapter ----------------
   Inside Claude, favorites persist through Claude's artifact storage.
   When this file is hosted on a regular website, favorites persist in
   the visitor's own browser storage. If neither is available, favorites
   last for the current visit only. */
const MEM = {};
const hasClaudeStore = (typeof window !== "undefined") && window.storage && (typeof window.storage.get === "function");
async function kvGet(key){
  if (hasClaudeStore){
    try { const r = await window.storage.get(key, false); return r ? r.value : null; }
    catch(e){ return null; }
  }
  try { return window.localStorage.getItem(key); }
  catch(e){ return (key in MEM) ? MEM[key] : null; }
}
async function kvSet(key, val){
  if (hasClaudeStore){
    try { await window.storage.set(key, val, false); } catch(e){}
    return;
  }
  try { window.localStorage.setItem(key, val); }
  catch(e){ MEM[key] = val; }
}

function esc(s){
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function byId(id){ return document.getElementById(id); }
function fmtRange(s){ return s.startLabel + " to " + s.endLabel; }
function sessionsOf(dayId){ return DATA.sessions.filter(function(s){ return s.day === dayId; }); }
function findSession(id){ return DATA.sessions.find(function(s){ return s.id === id; }); }

/* Conference clock: highlights the current session while the meeting runs. */
function todayId(){
  const now = new Date();
  const stamp = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0") + "-" + String(now.getDate()).padStart(2,"0");
  const d = DATA.days.find(function(x){ return x.date === stamp; });
  return d ? d.id : null;
}
function isNow(s){
  const t = todayId();
  if (t !== s.day) return false;
  const now = new Date();
  const m = now.getHours()*60 + now.getMinutes();
  return m >= s.startMin && m < s.endMin;
}

/* ---------------- program rendering ---------------- */
function renderDayTabs(){
  const host = byId("dayTabs");
  host.innerHTML = DATA.days.map(function(d){
    return '<button class="daytab' + (state.day===d.id?" on":"") + '" role="tab" aria-selected="' + (state.day===d.id) + '" data-day="' + d.id + '">' +
      '<span class="d">' + esc(d.short) + '</span><span class="n">' + esc(d.num) + '</span></button>';
  }).join("");
  host.querySelectorAll("button").forEach(function(b){
    b.addEventListener("click", function(){
      state.day = b.getAttribute("data-day");
      state.q = ""; byId("q").value = "";
      renderDayTabs(); renderProgramList();
    });
  });
}
function renderRoomChips(){

  host.querySelectorAll("button").forEach(function(b){
    b.addEventListener("click", function(){
      state.room = b.getAttribute("data-room");
      renderRoomChips(); renderProgramList();

}
function matches(s, q){
  if (!q) return true;
  const hay = [s.code||"", s.title, s.room||"", (s.chair||"")].concat(
    (s.papers||[]).map(function(p){
      return p.t + " " + p.a.map(function(a){ return a.n + " " + (a.af||""); }).join(" ");
    })
  ).join(" ").toLowerCase();
  return q.toLowerCase().split(/\s+/).every(function(w){ return hay.indexOf(w) !== -1; });
}

       (showDay ? ' &middot; ' + esc(DATA.days.find(function(d){return d.id===s.day;}).long) : "") + '</div>';
  if (s.chair) h += '<div class="meta" style="margin-top:2px">Chair: ' + esc(s.chair) + '</div>';
  if (s.note) h += '<div class="note" style="margin-top:5px">' + esc(s.note) + '</div>';
  h += '</div>';
  if (s.starrable !== false){
    h += '<button class="star" data-star="' + s.id + '" aria-pressed="' + starred + '" aria-label="' +
      (starred ? "Remove from my agenda: " : "Add to my agenda: ") + esc(s.title) + '">' + (starred ? "\u2605" : "\u2606") + '</button>';
  }
  h += '</div>';
  if (s.papers && s.papers.length){
    h += '<button class="expander" data-open="' + s.id + '" aria-expanded="' + open + '">' +
         (open ? "Hide papers" : "Show " + s.papers.length + (s.papers.length===1?" paper":" papers")) + ' \u25BE</button>';
    h += '<div class="papers' + (open?"":" hide") + '" id="papers-' + s.id + '">';
    s.papers.forEach(function(p){
      h += '<div class="paper"><div class="pt">' + esc(p.t) + '</div>';
      h += '<div class="pa">' + p.a.map(function(a){
        let line = esc(a.n) + (a.af ? ", " + esc(a.af) : "");
        if (CONFIG.showEmails && a.e) line += " &middot; " + esc(a.e);
        return line;
      }).join("<br>") + '</div>';
      if (p.sub) h += '<div class="ps">Submission ' + esc(p.sub) + '</div>';
      h += '</div>';
    });
    h += '</div>';
  }
  h += '</article>';
  return h;
}
function wireCards(root){
  root.querySelectorAll("[data-star]").forEach(function(b){
    b.addEventListener("click", function(){
      const id = b.getAttribute("data-star");
      if (state.stars.has(id)) state.stars.delete(id); else state.stars.add(id);
      kvSet("atma26:stars", JSON.stringify(Array.from(state.stars)));
      updateBadge();
      const starred = state.stars.has(id);
      b.setAttribute("aria-pressed", String(starred));
      b.textContent = starred ? "\u2605" : "\u2606";
      const s = findSession(id);
      b.setAttribute("aria-label", (starred ? "Remove from my agenda: " : "Add to my agenda: ") + s.title);
      if (state.tab === "agenda") renderAgenda();
    });
  });
  root.querySelectorAll("[data-open]").forEach(function(b){
    b.addEventListener("click", function(){
      const id = b.getAttribute("data-open");
      const box = byId("papers-" + id);
      const s = findSession(id);
      if (state.open.has(id)){ state.open.delete(id); box.classList.add("hide"); b.setAttribute("aria-expanded","false");
        b.innerHTML = "Show " + s.papers.length + (s.papers.length===1?" paper":" papers") + " \u25BE"; }
      else { state.open.add(id); box.classList.remove("hide"); b.setAttribute("aria-expanded","true");
        b.innerHTML = "Hide papers \u25BE"; }
    });
  });
}

function icsStamp(date, hm){
  return date.replace(/-/g,"") + "T" + hm.replace(":","") + "00";
}
function downloadIcs(){
  const starred = DATA.sessions.filter(function(s){ return state.stars.has(s.id); });
  const lines = ["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//AtMA//2026 Nashville//EN","CALSCALE:GREGORIAN"];
  starred.forEach(function(s){
    const d = DATA.days.find(function(x){ return x.id===s.day; });
    lines.push("BEGIN:VEVENT");
    lines.push("UID:atma2026-" + s.id + "@atlanticmarketingassociation.com");
    lines.push("DTSTART:" + icsStamp(d.date, s.start));
    lines.push("DTEND:" + icsStamp(d.date, s.end));
    lines.push("SUMMARY:" + (s.code ? s.code + " " : "") + s.title.replace(/[,;]/g," "));
    lines.push("LOCATION:" + (s.room ? s.room + " · " : "") + "Drury Plaza Hotel Nashville Downtown");
    lines.push("END:VEVENT");
  });
  lines.push("END:VCALENDAR");
  const text = lines.join("\r\n");
  try {
    const blob = new Blob([text], {type:"text/calendar"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "atma-2026-agenda.ics";
    document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 400);
  } catch(e){
    window.prompt("Copy this calendar text and save it as atma-2026-agenda.ics", text);
  }
}

/* Live street map: Leaflet with the OpenStreetMap basemap. If the library or
   the map tiles cannot load, for example fully offline, the built in schematic
   view takes over automatically. */
var LIVEMAP = null, LIVEMARKERS = [];
function activateSchematic(reason){
  if (LIVEMAP){ try{ LIVEMAP.remove(); }catch(e){} LIVEMAP = null; }
  LIVEMARKERS = [];
  var lw = byId("liveMapWrap"), sw = byId("svgWrap");
  if (!lw || !sw) return;
  lw.classList.add("hide");
  sw.classList.remove("hide");
  drawPoiSvg();
  if (reason === "tiles" && byId("mapNote")){
    byId("mapNote").innerHTML = '<p class="note" style="margin-top:8px">The street map could not load in this window, so the schematic view is shown. The hosted version of this page displays the full interactive street map.</p>';
  }
}
function initLiveMap(){
  LIVEMARKERS = [];
  if (state.tab !== "map" || !byId("liveMap")) return;
  if (typeof L === "undefined"){
    if (document.readyState === "complete"){ activateSchematic("no-lib"); }
    else { setTimeout(initLiveMap, 250); }
    return;
  }
  if (LIVEMAP){ try{ LIVEMAP.remove(); }catch(e){} LIVEMAP = null; }
  try{
    LIVEMAP = L.map("liveMap", { scrollWheelZoom: true });
    var loaded = 0, failed = 0;
    var tiles = L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors'
    });
    tiles.on("tileload", function(){ loaded++; });
    tiles.on("tileerror", function(){ failed++; });
    setTimeout(function(){ if (loaded === 0 && failed > 0) activateSchematic("tiles"); }, 4000);
    tiles.addTo(LIVEMAP);
    var hotel = DATA.hotel;
    var star = L.divIcon({ className: "", html: '<div class="lm-star">\u2605</div>', iconSize: [30,30], iconAnchor: [15,15] });
    L.marker([hotel.lat, hotel.lng], { icon: star, title: hotel.name, zIndexOffset: 500 })
      .addTo(LIVEMAP)
      .bindPopup('<strong>' + esc(hotel.name) + '</strong><br>Conference venue \u00b7 300 Korean Veterans Blvd');
    var pts = [[hotel.lat, hotel.lng]];
    DATA.pois.forEach(function(p, i){
      var col = p.cat === "program" ? "#2E77AC" : "#2E7D74";
      var icon = L.divIcon({ className: "", html: '<div class="lm-pin" style="background:' + col + '">' + (i+1) + '</div>', iconSize: [26,26], iconAnchor: [13,13] });
      var mk = L.marker([p.lat, p.lng], { icon: icon, title: p.name }).addTo(LIVEMAP);
      mk.bindPopup('<strong>' + esc(p.name) + '</strong><br>' + p.mi.toFixed(2) + ' mi from the hotel');
      mk.on("click", function(){ selectPoi(i, {scroll:false}); });
      LIVEMARKERS.push(mk);
      pts.push([p.lat, p.lng]);
    });
    LIVEMAP.fitBounds(L.latLngBounds(pts).pad(0.12));
  } catch(e){
    activateSchematic("tiles");
  }
}

function drawPoiSvg(){
  const svg = byId("poiSvg");
  const G = DATA.geo;
  const cx = 200, cy = 210;
  let s = "";
  /* rings */
  [0.25, 0.5].forEach(function(mi){
    const r = mi * G.scale;
    s += '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="#C6D4E0" stroke-width="1" stroke-dasharray="3 4"/>';
    s += '<text x="' + cx + '" y="' + (cy - r - 4) + '" text-anchor="middle" font-family="Libre Franklin, Segoe UI, Arial, sans-serif" font-size="9.5" letter-spacing="1.5" fill="#8CA0B2">' + (mi===0.25 ? "1/4 MI" : "1/2 MI") + '</text>';
  });
  /* Broadway alignment between two verified addresses on Broadway */
  if (G.broadway){
    s += '<line x1="' + G.broadway.x1 + '" y1="' + G.broadway.y1 + '" x2="' + G.broadway.x2 + '" y2="' + G.broadway.y2 + '" stroke="#8CA0B2" stroke-width="2.5" stroke-dasharray="6 5" opacity="0.6"/>';
    s += '<text x="' + G.broadway.lx + '" y="' + G.broadway.ly + '" font-family="Libre Franklin, Segoe UI, Arial, sans-serif" font-size="10.5" letter-spacing="2.5" fill="#5A6B7C" transform="rotate(' + G.broadway.rot + ' ' + G.broadway.lx + ' ' + G.broadway.ly + ')">BROADWAY</text>';
  }
  /* north arrow */
  s += '<g transform="translate(372,26)"><path d="M0 10 L0 -8" stroke="#1E4468" stroke-width="1.6"/><path d="M-4 -3 L0 -10 L4 -3" fill="#1E4468"/><text x="0" y="24" text-anchor="middle" font-family="Libre Franklin, Segoe UI, Arial, sans-serif" font-size="10" letter-spacing="1" fill="#1E4468">N</text></g>';
  /* scale bar */
  const sb = 0.25 * G.scale;
  s += '<g transform="translate(18,400)"><line x1="0" y1="0" x2="' + sb + '" y2="0" stroke="#1E4468" stroke-width="2"/><line x1="0" y1="-4" x2="0" y2="4" stroke="#1E4468" stroke-width="2"/><line x1="' + sb + '" y1="-4" x2="' + sb + '" y2="4" stroke="#1E4468" stroke-width="2"/><text x="' + (sb/2) + '" y="-7" text-anchor="middle" font-family="Libre Franklin, Segoe UI, Arial, sans-serif" font-size="9.5" letter-spacing="1.5" fill="#1E4468">1/4 MILE</text></g>';
  /* hotel */
  s += '<g><path transform="translate(' + cx + ',' + cy + ') scale(1.15)" d="M0 -9 L2.4 -2.8 L9 -2.8 L3.6 1.4 L5.6 8 L0 4.2 L-5.6 8 L-3.6 1.4 L-9 -2.8 L-2.4 -2.8 Z" fill="#D8A93C" stroke="#1E4468" stroke-width="1.4"/>';
  s += '<text x="' + cx + '" y="' + (cy + 24) + '" text-anchor="middle" font-family="Libre Franklin, Segoe UI, Arial, sans-serif" font-weight="700" font-size="11" letter-spacing="1.5" fill="#1E4468">DRURY PLAZA</text></g>';
  /* pois */
  DATA.pois.forEach(function(p, i){
    const col = p.cat === "program" ? "#2E77AC" : "#2E7D74";
    s += '<g class="poi-dot" data-poi="' + i + '" role="button" tabindex="0" aria-label="' + esc(p.name) + '">' +
      '<circle class="halo" cx="' + p.x + '" cy="' + p.y + '" r="15"/>' +
      '<circle class="core" cx="' + p.x + '" cy="' + p.y + '" r="9.5" fill="' + col + '" stroke="#FFFFFF" stroke-width="1.5"/>' +
      '<text x="' + p.x + '" y="' + (p.y + 3.6) + '" text-anchor="middle" font-family="Libre Franklin, Segoe UI, Arial, sans-serif" font-weight="700" font-size="10.5" fill="#fff">' + (i+1) + '</text></g>';
  });
  svg.innerHTML = s;
  svg.querySelectorAll(".poi-dot").forEach(function(g){
    const idx = Number(g.getAttribute("data-poi"));
    g.addEventListener("click", function(){ selectPoi(idx); });
    g.addEventListener("keydown", function(ev){ if (ev.key === "Enter" || ev.key === " "){ ev.preventDefault(); selectPoi(idx); } });
  });
}

    '<textarea id="bText" maxlength="400" placeholder="Share a note, a question, or a dinner plan" aria-label="Message"></textarea>' +
    '<div class="btnrow" style="margin-top:0"><button class="btn" id="bPost">Post</button><button class="btn ghost" id="bRefresh">Refresh</button></div>' +
    '<div id="bList" style="margin-top:12px"><p class="note">Loading messages...</p></div></div>';
  byId("bPost").addEventListener("click", postBoard);
  byId("bRefresh").addEventListener("click", loadBoard);
  loadBoard();
}
async function loadBoard(){
  const list = byId("bList");
  if (!list) return;
  try{
    const r = await window.storage.list("atma26board:", true);
    const keys = (r && r.keys) ? r.keys.slice() : [];
    keys.sort(); keys.reverse();
    const top = keys.slice(0, 50);
    const vals = await Promise.all(top.map(function(k){
      return window.storage.get(k, true).catch(function(){ return null; });
    }));
    const msgs = vals.filter(Boolean).map(function(v){
      try { return JSON.parse(v.value); } catch(e){ return null; }
    }).filter(Boolean);
    if (!msgs.length){ list.innerHTML = '<p class="note">No posts yet. Start the conversation.</p>'; return; }
    list.innerHTML = msgs.map(function(m){
      const when = m.ts ? new Date(m.ts).toLocaleString([], {month:"short", day:"numeric", hour:"numeric", minute:"2-digit"}) : "";
      return '<div class="msg"><span class="who">' + esc(m.n) + '</span><span class="when">' + esc(when) + '</span><div class="txt">' + esc(m.t) + '</div></div>';
    }).join("");
  } catch(e){
    list.innerHTML = '<p class="note">The message board could not load right now.</p>';
  }
}
async function postBoard(){
  const nameEl = byId("bName"), textEl = byId("bText");
  const n = nameEl.value.trim(), t = textEl.value.trim();
  if (!n || !t){ alert("Please add your name and a message."); return; }
  const ts = Date.now();
  const key = "atma26board:" + ts + "-" + Math.floor(Math.random()*100000);
  try{
    await window.storage.set(key, JSON.stringify({n:n.slice(0,40), t:t.slice(0,400), ts:ts}), true);
    textEl.value = "";
    loadBoard();
  } catch(e){
    alert("The post could not be saved. Please try again.");
  }
}

/* ---------------- navigation ---------------- */
function updateBadge(){
  const b = byId("agendaBadge");
  const n = state.stars.size;
  b.textContent = String(n);
  b.classList.toggle("hide", n === 0);
}
function setTab(t){
  state.tab = t;
  ["program","agenda","map","info"].forEach(function(x){
    byId("tab-" + x).classList.toggle("on", x === t);
  });
  if (t === "program") renderProgram();
  else if (t === "agenda") renderAgenda();
  else if (t === "map") renderMap();
  else renderInfo();
  window.scrollTo({top: t === "program" ? Math.min(window.scrollY, 0) : 0});
  byId("view").focus({preventScroll:true});
}

async function init(){
  try{
    const raw = await kvGet("atma26:stars");
    if (raw){ JSON.parse(raw).forEach(function(id){ state.stars.add(id); }); }
  } catch(e){}
  const t = todayId();
  if (t && t !== "wed") state.day = t;
  else if (t === "wed") state.day = "wed";
  updateBadge();
  byId("tab-program").addEventListener("click", function(){ setTab("program"); });
  byId("tab-agenda").addEventListener("click", function(){ setTab("agenda"); });
  byId("tab-map").addEventListener("click", function(){ setTab("map"); });
  byId("tab-info").addEventListener("click", function(){ setTab("info"); });
  byId("q").addEventListener("input", function(e){
    state.q = e.target.value;
    renderProgramList();
  });
  renderProgram();
}
init();
</script>
</body>
